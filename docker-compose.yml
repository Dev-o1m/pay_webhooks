services:
  app:
    build: .
    container_name: pay-webhooks-app
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - '8000:8000'

  postgres:
    image: postgres:16-alpine
    container_name: pay-webhooks-postgres
    environment:
      POSTGRES_DB: payments
      POSTGRES_USER: pay_user
      POSTGRES_PASSWORD: pay_password
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U pay_user -d payments']
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: pay-webhooks-redis
    ports:
      - '6379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  postgres_data:
